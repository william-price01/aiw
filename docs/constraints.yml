project:
  name: aiw
  stack: Python 3.10+; local CLI; Codex CLI integration; git
layers:
- name: cli
  allowed_imports:
  - orchestrator
  - workflow
  - tasks
  - infra
- name: orchestrator
  allowed_imports:
  - workflow
  - tasks
  - infra
- name: workflow
  allowed_imports:
  - tasks
  - infra
- name: tasks
  allowed_imports:
  - infra
- name: infra
  allowed_imports: []
boundaries:
  internal_tool_state:
    paths:
    - .aiw/**
    writer: aiw_only
    coding_agents_must_not_write: true
  locked_artifacts:
    always_locked: []
    lock_after_state:
    - artifact: docs/prd.md
      state: PRD_APPROVED
    - artifact: docs/sdd.md
      state: SDD_APPROVED
    - artifact: docs/adrs/**
      state: ADRS_APPROVED
    - artifact: docs/constraints.yml
      state: CONSTRAINTS_APPROVED
    immutable_during_execution:
    - docs/tasks/DAG.md
    - docs/tasks/DAG.yml
    - docs/tasks/TASK-???.md
    mutable_during_execution_append_only:
    - docs/tasks/COMPLETED.md
  change_request:
    file: docs/requests/CHANGE_REQUEST.md
    required_for_modifying_locked_artifacts: true
    requires_reapproval_transition:
      PRD:
        from_state: PRD_APPROVED
        to_state: PRD_DRAFT
        reapprove_command: aiw approve-prd
      SDD:
        from_state: SDD_APPROVED
        to_state: SDD_DRAFT
        reapprove_command: aiw approve-sdd
      ADRS:
        from_state: ADRS_APPROVED
        to_state: ADRS_DRAFT
        reapprove_command: aiw approve-adrs
      CONSTRAINTS:
        from_state: CONSTRAINTS_APPROVED
        to_state: CONSTRAINTS_DRAFT
        reapprove_command: aiw approve-constraints
agents:
  task_scoped_coding_agent:
    enforced: true
    task_id_regex: ^TASK-\d{3}$
    no_cross_task_edits: true
    memory:
      type: markdown_capsule
      path_template: docs/tasks/{TASK_ID}.log.md
      append_only: true
write_scope_validation:
  enabled: true
  allowed_edit_paths:
  - aiw/**
  - tests/**
  - docs/tasks/**
  forbid_paths:
  - .aiw/**
diff_validation:
  enabled: true
  max_files_changed: 30
  max_lines_changed: 1500
  hard_fail_on_exceed: true
quality:
  test_command: `pytest -q`
  lint_command: `ruff check .`
  typecheck_command: `mypy aiw tests` 
observability:
  traces:
    required_events:
    - state_transition
    - constraint_validation
    - scope_validation
    - diff_threshold_check
    - test_run_started
    - test_run_failed
    - test_run_passed
    - fixer_spawned
    - iteration_exhausted
    - blocked
    - run_complete
    - task_marked_complete
    - quality_gate_failed
    - lock_violation_hard_fail
  artifacts:
    jsonl_trace_path: .aiw/runs/run-<timestamp>.jsonl
workflow:
  state_file: .aiw/workflow_state.json
  enforce_state_machine: true
  illegal_actions_must_fail_hard: true
  state_transitions_must_be_logged: true
  states:
  - INIT
  - PRD_DRAFT
  - PRD_APPROVED
  - SDD_DRAFT
  - SDD_APPROVED
  - ADRS_DRAFT
  - ADRS_APPROVED
  - CONSTRAINTS_DRAFT
  - CONSTRAINTS_APPROVED
  - PLANNED
  - EXECUTING
  - BLOCKED
  allowed_commands_by_state:
    INIT:
    - aiw init
    - aiw prd
    PRD_DRAFT:
    - edit docs/prd.md
    - aiw approve-prd
    PRD_APPROVED:
    - aiw sdd
    - aiw request-change
    SDD_DRAFT:
    - edit docs/sdd.md
    - aiw approve-sdd
    SDD_APPROVED:
    - aiw adrs
    - aiw request-change
    ADRS_DRAFT:
    - edit docs/adrs/**
    - aiw approve-adrs
    ADRS_APPROVED:
    - aiw constraints
    - aiw request-change
    CONSTRAINTS_DRAFT:
    - edit docs/constraints.yml
    - aiw approve-constraints
    CONSTRAINTS_APPROVED:
    - aiw decompose
    - aiw request-change
    PLANNED:
    - aiw go TASK-###
    - aiw request-change
    EXECUTING:
    - aiw undo
    - aiw reset TASK-###
    BLOCKED:
    - aiw request-change
  transitions:
  - from: INIT
    command: aiw prd
    to: PRD_DRAFT
  - from: PRD_DRAFT
    command: aiw approve-prd
    to: PRD_APPROVED
  - from: PRD_APPROVED
    command: aiw sdd
    to: SDD_DRAFT
  - from: SDD_DRAFT
    command: aiw approve-sdd
    to: SDD_APPROVED
  - from: SDD_APPROVED
    command: aiw adrs
    to: ADRS_DRAFT
  - from: ADRS_DRAFT
    command: aiw approve-adrs
    to: ADRS_APPROVED
  - from: ADRS_APPROVED
    command: aiw constraints
    to: CONSTRAINTS_DRAFT
  - from: CONSTRAINTS_DRAFT
    command: aiw approve-constraints
    to: CONSTRAINTS_APPROVED
  - from: CONSTRAINTS_APPROVED
    command: aiw decompose
    to: PLANNED
  - from: PLANNED
    command: aiw go TASK-###
    to: EXECUTING
  - from: EXECUTING
    on: success
    to: PLANNED
  - from: EXECUTING
    on: exhaustion
    to: BLOCKED
  - from: EXECUTING
    on: scope_violation_second
    to: BLOCKED
  - from: EXECUTING
    on: oversized_split
    to: BLOCKED
  - from: EXECUTING
    on: abort
    to: PLANNED
  - from: EXECUTING
    on: stale_execution_detected
    to: BLOCKED
locking_rules:
  enforce_command_level_validation: true
  forbid_silent_edits_to_locked_artifacts: true
  hard_fail_on_locked_artifact_modification_during_EXECUTING: true
  locked_artifacts_checked_via_git_diff_name_only: true
execution:
  max_iterations_per_task: 3
  task_completion:
    enabled: true
    tracker_file: docs/tasks/COMPLETED.md
    append_only: true
    mark_on_pass: true
  constraints_finalization_gate:
    enabled: true
    required_non_placeholder_fields:
    - quality.test_command
    placeholder_values:
    - TBD
    - ''
    refuse_commands:
    - aiw decompose
    - aiw go TASK-###
  run_id:
    required: true
    write_on_enter_EXECUTING: true
  stale_execution_policy:
    enabled: true
    on_detect_EXECUTING_at_startup:
      transition_to: BLOCKED
      emit_event: stale_execution_detected
